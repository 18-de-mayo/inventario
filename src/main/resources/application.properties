spring.application.name=ms-inventario
server.port=8088

# Base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/db_inventarios?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# URL del MS producto para validar existencia
api.productos.url=http://localhost:8081

# Logs
logging.level.com.duoc.inventarios=INFO